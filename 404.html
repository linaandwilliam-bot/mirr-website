<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<title>Page not found — Mirr</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,400&family=Inter:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/tokens.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--page);color:var(--ink);font-family:var(--font-sans);font-weight:300;height:100%}
@media(prefers-color-scheme:dark){html,body{background:var(--page)!important;color:var(--ink)!important}}
nav{border-bottom:1px solid var(--line);padding:0 48px}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:62px}
.logo{display:flex;align-items:baseline;text-decoration:none}
.logo-word{font-family:var(--font-mono);font-size:20px;font-weight:500;letter-spacing:3px;color:var(--ink)}
.logo-flip{display:inline-block;transform:scaleX(-1);color:var(--sky)}
.nav-back{font-size:12px;color:var(--ink3);text-decoration:none}
.wrap{min-height:calc(100vh - 63px);display:flex;align-items:center;justify-content:center;padding:40px 24px}
.card{max-width:460px;text-align:center}
.code{font-family:var(--font-mono);font-size:12px;letter-spacing:.24em;color:var(--sky);margin-bottom:18px}
.title{font-family:var(--font-serif);font-size:34px;font-weight:500;margin-bottom:14px;line-height:1.15}
.sub{font-size:14px;color:var(--ink3);line-height:1.8;margin-bottom:32px}
.home-btn{display:inline-flex;align-items:center;gap:10px;background:var(--ink);color:var(--white);text-decoration:none;padding:16px 28px;border-radius:4px;font-size:13px;letter-spacing:.08em;font-weight:500;transition:background .2s}
.home-btn:hover{background:var(--ink2)}
.divider{height:1px;background:var(--line);margin:32px 0}
.quick-links{display:flex;flex-direction:column;gap:10px;text-align:left;background:var(--paper);border-radius:8px;padding:20px 22px}
.ql-label{font-size:9px;letter-spacing:.18em;color:var(--ink4);margin-bottom:6px}
.ql-link{font-size:13px;color:var(--ink2);text-decoration:none;display:flex;align-items:center;gap:8px}
.ql-link:hover{color:var(--sky)}
.ql-link::before{content:"→";color:var(--sky);font-size:12px}
/* Keyboard focus — visible outline for tab navigation (a11y) */
a:focus-visible,button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--sky);outline-offset:2px}
</style>
</head>
<body>
<div id="nav"></div>
<script src="/nav.js"></script>
<div class="wrap">
  <div class="card">
    <div class="code">404 — NOT FOUND</div>
    <h1 class="title">This page tried it on.<br>It wasn't a fit.</h1>
    <p class="sub">The page you're looking for doesn't exist or has moved. Here's where you probably want to be instead.</p>

    <a href="/" class="home-btn">BACK TO THE HOMEPAGE</a>

    <div class="divider"></div>

    <div class="quick-links">
      <div class="ql-label">POPULAR PAGES</div>
      <a class="ql-link" href="/brand-demo">See the try-on demo</a>
      <a class="ql-link" href="/list-your-brand">List your brand</a>
      <a class="ql-link" href="/founding-brands">Founding brand offer</a>
      <a class="ql-link" href="/contact">Contact us</a>
    </div>
  </div>
</div>
<!-- Cloudflare Web Analytics --><script type='module' src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "c6fb28a3de5848c8837eaa3d8495d031"}'></script><!-- End Cloudflare Web Analytics -->
</body>
</html>
