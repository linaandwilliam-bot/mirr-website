<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<title>Brands on Mirr</title>
<meta name="description" content="Browse live brand storefronts on Mirr — see how virtual try-on works for real product catalogues.">
<link rel="canonical" href="https://www.trymirr.com/brands">
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Mirr">
<meta property="og:title" content="Brands on Mirr">
<meta property="og:description" content="Browse live brand storefronts on Mirr — see how virtual try-on works for real product catalogues.">
<meta property="og:url" content="https://www.trymirr.com/brands">
<meta property="og:image" content="https://www.trymirr.com/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,400&family=Inter:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/tokens.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--page);color:var(--ink);font-family:var(--font-sans);font-weight:300;line-height:1.7}
@media(prefers-color-scheme:dark){html,body{background:var(--page)!important;color:var(--ink)!important}}
nav{border-bottom:1px solid var(--line);padding:0 48px;position:sticky;top:0;background:var(--page);z-index:50}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:62px}
.logo{display:flex;align-items:baseline;text-decoration:none}
.logo-word{font-family:var(--font-mono);font-size:20px;font-weight:500;letter-spacing:3px;color:var(--ink)}
.logo-flip{display:inline-block;transform:scaleX(-1);color:var(--sky)}
.nav-back{font-size:12px;color:var(--ink3);text-decoration:none}

.hero{max-width:720px;margin:0 auto;padding:80px 24px 48px;text-align:center}
.eyebrow{font-size:10px;letter-spacing:.24em;color:var(--ink4);margin-bottom:18px;display:flex;align-items:center;justify-content:center;gap:10px}
.eyebrow::before,.eyebrow::after{content:"";width:16px;height:.5px;background:var(--sky)}
.hero-title{font-family:var(--font-serif);font-size:clamp(34px,5vw,52px);font-weight:500;line-height:1.1;margin-bottom:20px}
.hero-title em{font-style:italic;color:var(--sky)}
.hero-sub{font-size:16px;color:var(--ink3);line-height:1.85;max-width:560px;margin:0 auto}

.section{max-width:960px;margin:0 auto;padding:0 24px 64px}

.brand-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px}
.brand-card{display:block;background:var(--white);border:1px solid var(--line);border-radius:10px;padding:22px;text-decoration:none;color:inherit;transition:box-shadow .2s,border-color .2s}
.brand-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.06);border-color:var(--sky-brd)}
.brand-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.brand-logo{width:44px;height:44px;background:var(--brand);border-radius:8px;display:flex;align-items:center;justify-content:center;flex:none}
.brand-logo-t{font-family:var(--font-mono);font-size:14px;font-weight:500;color:var(--white)}
.brand-name{font-family:var(--font-serif);font-size:18px;font-weight:500;color:var(--ink);margin-bottom:2px}
.brand-verified{display:inline-block;font-size:8px;letter-spacing:.1em;color:var(--sky-text);background:var(--sky-bg);border:.5px solid var(--sky-brd);border-radius:3px;padding:2px 6px;margin-left:6px;vertical-align:2px}
.brand-loc{font-size:10px;color:var(--ink4);letter-spacing:.06em}
.brand-desc{font-size:13px;color:var(--ink3);line-height:1.7;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.brand-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.brand-tag{font-size:9px;letter-spacing:.08em;color:var(--ink3);background:var(--paper);border-radius:999px;padding:3px 9px}
.brand-cta{font-size:11px;letter-spacing:.06em;color:var(--sky-text);font-weight:500}

.empty-note{text-align:center;color:var(--ink3);font-size:14px;padding:40px 0}

footer{padding:32px 24px;text-align:center}
.footer-note{font-size:12px;color:var(--ink4)}
.footer-note a{color:var(--sky-text);text-decoration:none}

@media(max-width:640px){
  nav{padding:0 20px}
  .hero{padding:48px 20px 32px}
}
/* Keyboard focus — visible outline for tab navigation (a11y) */
a:focus-visible,button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--sky);outline-offset:2px}
</style>
</head>
<body>

<div id="nav" data-variant="back"></div>
<script src="/nav.js"></script>

<div class="hero">
  <div class="eyebrow">MIRR MARKETPLACE</div>
  <h1 class="hero-title">Brands on <em>Mirr</em></h1>
  <p class="hero-sub">Browse live storefronts and try garments on yourself before you buy — powered by Mirr's virtual try-on.</p>
</div>

<div class="section">
  <div class="brand-grid" id="brand-grid"></div>
  <div class="empty-note" id="empty-note" style="display:none">No brands to show yet — check back soon.</div>
</div>

<footer>
  <div class="footer-note">Questions? <a href="/contact">Get in touch</a> — or email <a href="mailto:hello@trymirr.com">hello@trymirr.com</a></div>
</footer>

<script src="/error-report.js"></script>
<script>
function brandCardHTML(slug, brand) {
  var tags = (brand.tags || []).slice(0, 3).map(function(t) {
    return '<div class="brand-tag">' + t + '</div>';
  }).join('');
  return '<a class="brand-card" href="/brand-demo?brand=' + encodeURIComponent(slug) + '">' +
      '<div class="brand-top">' +
        '<div class="brand-logo"><div class="brand-logo-t">' + brand.initials + '</div></div>' +
        '<div>' +
          '<div class="brand-name">' + brand.name +
            (brand.verified ? '<span class="brand-verified">✓ VERIFIED</span>' : '') +
          '</div>' +
          '<div class="brand-loc">' + brand.location + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="brand-desc">' + brand.description + '</div>' +
      '<div class="brand-tags">' + tags + '</div>' +
      '<div class="brand-cta">VIEW STOREFRONT →</div>' +
    '</a>';
}

fetch('/brands.json', { cache: 'no-store' })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    var slugs = Object.keys(data);
    var grid = document.getElementById('brand-grid');
    if (slugs.length === 0) {
      // Genuinely empty catalogue — honest state, keep the original wording
      document.getElementById('empty-note').style.display = 'block';
      return;
    }
    grid.innerHTML = slugs.map(function(slug) { return brandCardHTML(slug, data[slug]); }).join('');
  })
  .catch(function(err) {
    // Load/parse failure — distinct from an empty catalogue (matches
    // brand-demo's Sprint 29 fallback tone), reported via the shared net
    reportClientError('brands directory data failed: ' + (err && err.message ? err.message : String(err)), 'brands.html fetch', null);
    var note = document.getElementById('empty-note');
    note.textContent = 'Something went wrong loading brands — try again shortly.';
    note.style.display = 'block';
  });
</script>

</body>
</html>
